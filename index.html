    <style>
@font-face {
    font-family: 'Geist';
    src: url('fonts/Geist-VariableFont_wght.ttf') format('truetype');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
}
@font-face {
    font-family: 'Geist';
    src: url('fonts/Geist-Italic-VariableFont_wght.ttf') format('truetype');
    font-weight: 100 900;
    font-style: italic;
    font-display: swap;
}
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark:   #1a2535;
            --darker: #0f1822;
            --white:  #ffffff;
            --gray:   #6b7280;
            --badge:  #e05c2a;
            --teal:   #0891b2;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Geist', sans-serif;
            background: #0a1628;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* ══ SCROLL RUNWAY ══════════════════════════════════════════ */
        #hero-wrapper { position: relative; height: 300vh; }

        /* ══ HERO (sticky) ══════════════════════════════════════════ */
        #hero {
            position: sticky;
            top: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #050e1a;
        }

        /* Mobile: runway menor (200vh), hero continua sticky */
        @media (max-width: 768px) {
            #hero-wrapper { height: 200vh; }
        }

        /* ── MOBILE DEST GRID (aparece na fase final do hero) ── */
        .mobile-dest-grid {
            display: none;
        }
        @media (max-width: 900px) {
            .mobile-dest-grid {
                display: block;
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                z-index: 20;
                opacity: 0;
                width: 94%;
                text-align: center;
                pointer-events: none;
                will-change: opacity;
            }
            .mobile-dest-grid.visible { pointer-events: auto; }
            .mobile-dest-items {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                margin-top: 14px;
            }
            .mobile-dest-item {
                display: flex; flex-direction: column;
                align-items: center; gap: 5px;
                text-decoration: none; color: #fff;
            }
            .mobile-dest-item img {
                width: 100%; aspect-ratio: 1;
                object-fit: cover; border-radius: 10px;
                border: 1.5px solid rgba(255,255,255,.25);
            }
            .mobile-dest-item span {
                font-size: 10px; font-weight: 600;
                color: rgba(255,255,255,.9); line-height: 1.2;
            }
        }

        /* ── Vídeo único ── */
        #bg-video {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            transform-origin: center center;
            will-change: transform;
        }

        /* overlay sutil */
        .hero-overlay {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 50% 50%, rgba(5,14,26,.28) 0%, transparent 70%),
                linear-gradient(
                    to bottom,
                    rgba(5,14,26,.08)  0%,
                    rgba(5,14,26,.02) 40%,
                    rgba(5,14,26,.30) 100%
                );
            z-index: 1;
            pointer-events: none;
        }

        /* ── NAV ── */
        nav {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 28px 48px;
        }
        .nav-side { display: flex; gap: 32px; }
        .nav-link {
            font-size: 13px; font-weight: 500;
            color: rgba(255,255,255,.80); text-decoration: none;
            letter-spacing: .06em; text-transform: uppercase;
            transition: color .2s;
        }
        .nav-link:hover { color: #fff; }
        .nav-brand {
            position: absolute; left: 50%; transform: translateX(-50%);
            height: 38px; width: auto;
            display: block;
        }
        .nav-mobile-btn {
            display: none; background: none;
            border: none; cursor: pointer; padding: 8px;
        }
        @media (max-width: 768px) {
            .nav-side { display: none; }
            .nav-mobile-btn { display: flex; }
        }

        /* ── HERO UI ── */
        #hero-ui {
            position: absolute; inset: 0;
            z-index: 10;
            pointer-events: none;
        }
        #hero-ui > * { pointer-events: auto; }

        /* Título centralizado */
        .hero-content {
            position: absolute;
            inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
            pointer-events: none;
            padding-bottom: 32vh;
        }

        .hero-label {
            font-size: 12px; font-weight: 600;
            color: rgba(255,255,255,.55); letter-spacing: .24em;
            text-transform: uppercase; margin-bottom: 18px;
            animation: fadeUp .7s ease both .3s;
        }

        .hero-title {
            line-height: .88;
            letter-spacing: .05em;
            margin-bottom: 24px;
            animation: fadeUp .8s ease both .5s;
        }
        .hero-title .line1 {
            display: block;
            font-family: 'Geist', sans-serif;
            font-weight: 700;
            font-size: clamp(36px, 5.6vw, 86px);
            color: #fff;
            line-height: 1.1;
            white-space: nowrap;
            letter-spacing: .01em;
        }

        .hero-sub {
            font-size: clamp(14px, 1.4vw, 17px);
            color: rgba(255,255,255,.90);
            margin-bottom: 28px;
            animation: fadeUp .7s ease both .75s;
        }
        .hero-buttons {
            display: flex; gap: 12px; justify-content: center;
            animation: fadeUp .7s ease both .95s;
            pointer-events: auto;
        }
        .btn {
            font-size: 13px; font-weight: 500;
            padding: 11px 26px; border-radius: 999px;
            text-decoration: none; letter-spacing: .03em;
            transition: all .25s ease; border: none; cursor: pointer;
        }
        .btn-glass {
            background: rgba(255,255,255,.12); color: rgba(255,255,255,.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,.18);
        }
        .btn-glass:hover { background: rgba(255,255,255,.22); transform: translateY(-1px); }
        .btn-teal { background: var(--teal); color: var(--white); }
        .btn-teal:hover { background: #0780a0; transform: translateY(-1px); }

        /* ── FLOATING DESTINATION CARDS ── */
        .cards-left {
            position: absolute; left: max(16px, calc(50% - 500px));
            top: 18vh; height: 72vh;
            z-index: 20; display: flex; flex-direction: column; gap: 8px;
            opacity: 0; will-change: transform, opacity;
        }
        .cards-right {
            position: absolute; right: max(16px, calc(50% - 500px));
            top: 18vh; height: 72vh;
            z-index: 20; display: flex; flex-direction: column; gap: 8px;
            opacity: 0; will-change: transform, opacity;
        }
        .dest-float-card {
            background: rgba(255,255,255,.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            overflow: hidden;
            width: 196px;
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            animation: floatCard 4s ease-in-out infinite;
        }
        /* 3-D tilt — esquerda inclina para dentro */
        .cards-left .dest-float-card {
            transform: perspective(900px) rotateY(20deg);
            transform-origin: right center;
            box-shadow: 14px 20px 54px rgba(0,0,0,.22), -4px 0 16px rgba(0,0,0,.07);
        }
        /* 3-D tilt — direita inclina para dentro */
        .cards-right .dest-float-card {
            transform: perspective(900px) rotateY(-20deg);
            transform-origin: left center;
            box-shadow: -14px 20px 54px rgba(0,0,0,.22), 4px 0 16px rgba(0,0,0,.07);
        }
        @keyframes floatCard {
            0%,100% { translate: 0 0; }
            50%      { translate: 0 -8px; }
        }
        .dest-float-thumb {
            width: 100%; flex: 1; min-height: 0;
            object-fit: cover; display: block;
            background: #cce8f0;
        }
        .dest-float-info { flex-shrink: 0; padding: 11px 13px 13px; }
        .dest-float-name { font-size: 13px; font-weight: 700; color: var(--darker); line-height: 1.2; }
        .dest-float-tag  { font-size: 10px; color: var(--gray); margin-top: 3px; }
        .dest-float-btn {
            display: block; margin-top: 9px;
            font-size: 11px; font-weight: 600;
            color: var(--teal); text-decoration: none;
            letter-spacing: .03em;
            transition: color .18s;
            pointer-events: all;
        }
        .dest-float-btn:hover { color: #0ac0e0; }

        /* ── HERO CARDS TITLE ── */
        .hero-cards-title {
            position: absolute; left: 50%; top: 8%;
            transform: translateX(-50%);
            text-align: center; z-index: 20;
            opacity: 0; will-change: opacity;
            pointer-events: none; white-space: nowrap;
        }
        .hero-cards-label {
            font-size: 11px; font-weight: 600;
            color: rgba(255,255,255,.95); letter-spacing: .24em;
            text-transform: uppercase; margin-bottom: 10px;
        }
        .hero-cards-heading {
            font-family: 'Geist', sans-serif;
            font-size: clamp(26px, 3.2vw, 46px);
            font-weight: 700; color: #fff;
        }

        /* ── SCROLL CUE ── */
        .scroll-cue {
            position: absolute; bottom: 36px; left: 50%;
            transform: translateX(-50%);
            z-index: 20; font-size: 11px; font-weight: 500;
            color: rgba(255,255,255,.40); letter-spacing: .14em;
            text-transform: uppercase;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            animation: scrollBounce 2s ease-in-out infinite, fadeUp .6s ease both 1.5s;
        }
        .scroll-cue::after {
            content: ''; width: 1px; height: 28px;
            background: rgba(255,255,255,.25);
        }
        @keyframes scrollBounce {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50%      { transform: translateX(-50%) translateY(5px); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ══ LOADING SCREEN ═════════════════════════════════════════ */
        #page-loader {
            position: fixed; inset: 0; z-index: 9999;
            background: #050e1a;
            display: flex; align-items: center; justify-content: center;
            transition: opacity .7s ease, visibility .7s ease;
        }
        #page-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-inner { display: flex; flex-direction: column; align-items: center; }
        .loader-logo  { width: clamp(160px, 40vw, 240px); opacity: .92; margin-bottom: 36px; }
        .loader-bar   {
            width: clamp(120px, 30vw, 180px); height: 2px;
            background: rgba(255,255,255,.12); border-radius: 2px; overflow: hidden;
        }
        .loader-fill  {
            height: 100%; width: 0;
            background: var(--teal);
            animation: loaderFill 2.4s ease forwards;
        }
        @keyframes loaderFill {
            0%   { width: 0; }
            55%  { width: 75%; }
            100% { width: 100%; }
        }
        .loader-txt {
            font-size: 11px; font-weight: 500;
            color: rgba(255,255,255,.32); letter-spacing: .18em;
            text-transform: uppercase; margin-top: 22px;
        }

        /* ══ SHARED SECTION LABELS ══════════════════════════════════ */
        .section-label {
            font-size: 11px; font-weight: 600; letter-spacing: .22em;
            text-transform: uppercase; color: var(--teal); margin-bottom: 16px;
        }
        .section-title {
            font-family: 'Geist', sans-serif;
            font-size: clamp(28px, 4vw, 52px); font-weight: 700;
            color: var(--darker); line-height: 1.15;
            letter-spacing: -.02em; max-width: 640px; margin-bottom: 48px;
        }
        .section-title span { color: var(--teal); }

        /* ══ TEMÁTICOS ═════════════════════════════════════════════ */
        .tematicos {
            background: #fff;
            padding: 80px 0;
            text-align: center;
            overflow: hidden;
        }
        .tematicos-header { padding: 0 48px; margin-bottom: 40px; }
        .tematicos-title {
            font-family: 'Geist', sans-serif;
            font-size: clamp(28px, 4vw, 52px);
            font-weight: 700;
            color: var(--darker);
        }
        .tematicos-header .section-label { color: var(--teal); }
        .carousel-outer {
            position: relative;
            padding: 0 56px;
            overflow: hidden;
        }
        .carousel-track {
            display: flex;
            gap: 16px;
            transition: transform .45s cubic-bezier(.4,0,.2,1);
            will-change: transform;
        }
        .tematico-card {
            flex: 0 0 calc(25% - 12px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,.40);
            cursor: pointer;
            transition: transform .25s, box-shadow .25s;
        }
        .tematico-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 16px 48px rgba(0,0,0,.55);
        }
        .tematico-card img {
            width: 100%;
            aspect-ratio: 9 / 16;
            object-fit: cover;
            display: block;
        }
        .carousel-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: var(--teal); color: #fff;
            border: none; border-radius: 50%;
            width: 44px; height: 44px;
            font-size: 26px; line-height: 1;
            cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,.35);
            transition: background .2s, transform .2s;
        }
        .carousel-btn:hover { background: #0780a0; transform: translateY(-50%) scale(1.08); }
        .carousel-prev { left: 6px; }
        .carousel-next { right: 6px; }
        .carousel-dots {
            display: flex; justify-content: center;
            gap: 8px; margin-top: 28px;
        }
        .carousel-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #d1d5db; cursor: pointer;
            transition: background .25s; border: none; padding: 0;
        }
        .carousel-dot.active { background: var(--teal); }
        .tematicos-cta { margin-top: 40px; }
        @media (max-width: 900px) {
            .tematico-card { flex: 0 0 calc(50% - 8px); }
            .carousel-outer { padding: 0 20px; }
            .tematicos-header { padding: 0 24px; }
        }
        @media (max-width: 560px) {
            .tematico-card { flex: 0 0 72%; }
        }

        /* ── LIGHTBOX ── */
        .lightbox-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,.88);
            z-index: 1000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }
        .lightbox-overlay.open { display: flex; }
        .lightbox-img {
            max-height: 90vh;
            max-width: 80vw;
            width: auto;
            border-radius: 18px;
            box-shadow: 0 24px 80px rgba(0,0,0,.7);
            transition: opacity .18s ease;
        }
        .lightbox-img.fading { opacity: 0; }
        .lightbox-close {
            position: fixed; top: 20px; right: 24px;
            background: rgba(255,255,255,.12); border: none;
            color: #fff; font-size: 24px; line-height: 1;
            width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; z-index: 1001;
            display: flex; align-items: center; justify-content: center;
            transition: background .2s;
        }
        .lightbox-close:hover { background: rgba(255,255,255,.28); }
        .lightbox-nav {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,.12); border: none;
            color: #fff; font-size: 32px; line-height: 1;
            width: 52px; height: 52px; border-radius: 50%;
            cursor: pointer; z-index: 1001;
            display: flex; align-items: center; justify-content: center;
            transition: background .2s;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,.28); }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-counter {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,.55); font-size: 13px; letter-spacing: .06em;
        }

        /* ══ FORMULÁRIO 3 ETAPAS ═══════════════════════════════════ */
        .forms-section {
            background: #f5f6f8;
            padding: 96px 24px;
            display: flex; justify-content: center;
        }
        .forms-wrapper {
            display: grid;
            grid-template-columns: 1fr minmax(0, 540px);
            gap: 72px;
            max-width: 1100px;
            width: 100%;
            align-items: center;
        }

        /* ── copy lateral esquerda ── */
        .forms-copy-label {
            font-size: 11px; font-weight: 600; letter-spacing: .2em;
            text-transform: uppercase; color: var(--teal);
            margin-bottom: 20px; display: block;
        }
        .forms-copy-heading {
            font-family: 'Geist', sans-serif;
            font-size: clamp(28px, 3.2vw, 44px);
            font-weight: 700;
            color: var(--darker); line-height: 1.2;
            margin-bottom: 20px;
        }
        .forms-copy-text {
            font-size: 16px; color: var(--gray);
            line-height: 1.75; margin-bottom: 40px;
            max-width: 400px;
        }
        .forms-trust { display: flex; flex-direction: column; gap: 16px; }
        .forms-trust-item {
            display: flex; align-items: flex-start; gap: 12px;
        }
        .forms-trust-check {
            width: 22px; height: 22px; flex-shrink: 0;
            background: var(--teal); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-top: 1px;
        }
        .forms-trust-check svg { width: 12px; height: 12px; color: #fff; }
        .forms-trust-text {
            font-size: 15px; font-weight: 500; color: var(--darker); line-height: 1.4;
        }
        .forms-trust-sub {
            font-size: 13px; font-weight: 400; color: var(--gray); margin-top: 2px;
        }

        /* ── card direita ── */
        .forms-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,.06);
        }
        /* barra de progresso */
        .form-progress {
            display: flex; gap: 6px; margin-bottom: 28px;
        }
        .form-progress-seg {
            flex: 1; height: 4px; border-radius: 2px;
            background: #e5e7eb;
            transition: background .35s;
        }
        .form-progress-seg.done  { background: var(--darker); }
        .form-progress-seg.active { background: var(--teal); }
        /* passo label */
        .form-step-label {
            font-size: 11px; font-weight: 600; letter-spacing: .2em;
            text-transform: uppercase; color: var(--teal);
            margin-bottom: 10px;
        }
        .form-step-title {
            font-size: clamp(22px, 3vw, 30px);
            font-weight: 700; color: var(--darker);
            margin-bottom: 28px; line-height: 1.2;
        }
        /* grupo */
        .form-group { margin-bottom: 24px; }
        .form-group-label {
            font-size: 14px; font-weight: 600; color: var(--darker);
            margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
        }
        .form-group-hint {
            font-size: 12px; font-weight: 400;
            color: var(--gray);
        }
        /* chips de seleção */
        .form-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .form-chip {
            padding: 8px 18px; border-radius: 100px;
            border: 1.5px solid #d1d5db;
            font-size: 13px; font-weight: 500; color: var(--darker);
            cursor: pointer; background: #fff;
            transition: border-color .18s, background .18s, color .18s;
            user-select: none;
        }
        .form-chip:hover { border-color: var(--teal); }
        .form-chip.selected {
            background: var(--darker); border-color: var(--darker); color: #fff;
        }
        /* selects */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-select, .form-input, .form-textarea {
            width: 100%; padding: 12px 16px;
            border: 1.5px solid #d1d5db; border-radius: 12px;
            font-size: 14px; font-family: 'Geist', sans-serif;
            color: var(--darker); background: #fff;
            outline: none; transition: border-color .18s;
            appearance: none;
        }
        .form-select-wrap { position: relative; }
        .form-select-wrap::after {
            content: '⌄'; position: absolute; right: 14px; top: 50%;
            transform: translateY(-52%); pointer-events: none;
            color: var(--gray); font-size: 16px;
        }
        .form-select:focus, .form-input:focus, .form-textarea:focus {
            border-color: var(--teal);
        }
        .form-textarea {
            resize: vertical; min-height: 96px; line-height: 1.55;
        }
        .form-textarea::placeholder, .form-input::placeholder { color: #9ca3af; }
        /* divisor */
        .form-divider { border: none; border-top: 1px solid #e5e7eb; margin: 28px 0; }
        /* navegação */
        .form-nav {
            display: flex; align-items: center; justify-content: space-between;
        }
        .form-back {
            font-size: 14px; font-weight: 500; color: var(--gray);
            background: none; border: none; cursor: pointer;
            display: flex; align-items: center; gap: 4px;
            transition: color .18s;
        }
        .form-back:hover { color: var(--darker); }
        .btn-form-next {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--darker); color: #fff;
            border: none; border-radius: 100px;
            padding: 14px 28px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background .2s, transform .15s;
        }
        .btn-form-next:hover { background: #0f2c5f; transform: translateY(-1px); }
        .btn-form-submit {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--teal); color: #fff;
            border: none; border-radius: 100px;
            padding: 14px 28px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background .2s, transform .15s;
        }
        .btn-form-submit:hover { background: #0e7490; transform: translateY(-1px); }
        /* erro de validação */
        .form-error-msg {
            font-size: 12px; color: #e05c2a; font-weight: 500;
            margin-top: 8px; display: none; align-items: center; gap: 5px;
        }
        .form-error-msg.visible { display: flex; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-5px); }
            40%      { transform: translateX(5px); }
            60%      { transform: translateX(-3px); }
            80%      { transform: translateX(3px); }
        }
        .form-chips.shake { animation: shake .35s ease; }
        /* step visibilidade */
        .form-step { display: none; }
        .form-step.active { display: block; }
        /* sucesso */
        .form-success {
            display: none; text-align: center; padding: 24px 0;
        }
        .form-success.active { display: block; }
        .form-success-icon { font-size: 48px; margin-bottom: 16px; }
        .form-success h3 {
            font-size: 22px; font-weight: 700; color: var(--darker); margin-bottom: 10px;
        }
        .form-success p { font-size: 15px; color: var(--gray); line-height: 1.6; }
        @media (max-width: 900px) {
            .forms-wrapper {
                grid-template-columns: 1fr;
                gap: 40px;
                max-width: 540px;
            }
            .forms-copy-text { max-width: none; }
        }
        @media (max-width: 640px) {
            .forms-card { padding: 32px 20px; }
            .form-row { grid-template-columns: 1fr; }
        }

        /* ══ QUEM SOMOS ════════════════════════════════════════════ */
        .quem-somos {
            background: #0f1822;
            padding: 80px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .qs-watermark {
            position: absolute;
            bottom: 28px;
            right: 36px;
            width: 110px;
            opacity: 0.09;
            pointer-events: none;
            user-select: none;
        }
        .qs-inner {
            max-width: 1100px;
            margin: 0 auto;
        }
        .quem-somos .section-label {
            display: block;
            font-size: 13px;
            letter-spacing: .28em;
        }
        .qs-title {
            font-family: 'Geist', sans-serif;
            font-size: clamp(32px, 4vw, 58px);
            font-weight: 700;
            color: var(--white);
            line-height: 1.15;
            letter-spacing: -.01em;
            max-width: 680px;
            margin: 0 auto 24px;
        }
        .qs-text {
            font-size: clamp(15px, 1.4vw, 18px);
            color: rgba(255,255,255,.65);
            line-height: 1.75;
            max-width: 580px;
            margin: 0 auto 64px;
        }
        .qs-pillars {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }
        .qs-pillar {
            border-top: 1px solid rgba(255,255,255,.12);
            padding-top: 28px;
            display: flex; flex-direction: column;
        }
        .qs-pillar-icon {
            font-size: 22px;
            margin-bottom: 14px;
            display: block;
        }
        .qs-pillar h4 {
            font-size: 16px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 10px;
            letter-spacing: -.01em;
        }
        .qs-pillar p {
            font-size: 14px;
            color: rgba(255,255,255,.55);
            line-height: 1.7;
            flex: 1;
        }
        .qs-pillar-cta {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 20px;
            font-size: 13px; font-weight: 600;
            color: var(--teal);
            text-decoration: none;
            letter-spacing: .01em;
            transition: gap .2s, color .2s;
        }
        .qs-pillar-cta::after {
            content: '→';
            transition: transform .2s;
        }
        .qs-pillar-cta:hover {
            color: #0ac0e0;
            gap: 10px;
        }
        .qs-pillar-cta:hover::after {
            transform: translateX(2px);
        }
        @media (max-width: 900px) {
            .quem-somos { padding: 72px 24px; }
            .qs-pillars { grid-template-columns: 1fr; gap: 28px; }
        }

        .cta-section { background: #002860; padding: 80px 48px; text-align: center; }
        .cta-label { font-size: 11px; font-weight: 600; letter-spacing: .22em; text-transform: uppercase; color: var(--teal); margin-bottom: 16px; }
        .cta-title { font-family: 'Geist', sans-serif; font-size: clamp(28px,4vw,52px); font-weight: 700; color: var(--white); letter-spacing: -.02em; margin-bottom: 16px; }
        .cta-sub   { font-size: 16px; color: rgba(255,255,255,.55); margin-bottom: 36px; }

        footer {
            background: #002860;
            padding: 28px 48px; display: flex; justify-content: space-between; align-items: center;
        }
        .ft-brand { height: 26px; width: auto; display: block; opacity: .9; }
        .ft-copy  { font-size: 12px; color: rgba(255,255,255,.4); }

        @media (max-width: 900px) {
            nav { padding: 20px 24px; }
            .cards-left, .cards-right, .hero-cards-title { display: none; }
            .cta-section { padding: 60px 24px; }
            footer { flex-direction: column; gap: 12px; text-align: center; }
        }

        /* ══════════════════════════════════════════════════════════
           MOBILE — 768px
        ══════════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            /* Hero — o font-size e white-space vivem em .line1 */
            .hero-content { padding: 0 24px 32vh; }
            .hero-title { width: 100%; }
            .hero-title .line1 {
                display: block;
                font-family: 'Geist', sans-serif;
                font-weight: 700;
                font-size: clamp(32px, 9vw, 56px);
                white-space: normal !important;
                line-height: 1.1;
                letter-spacing: .01em;
                word-break: break-word;
            }
            .hero-sub   { font-size: clamp(14px, 3.5vw, 17px); padding: 0 4px; }
            .hero-buttons { flex-direction: column; align-items: center; gap: 10px; }
            .hero-buttons .btn { width: 220px; text-align: center; }
            .scroll-cue { bottom: 20px; }

            .section-title { font-size: clamp(28px, 6vw, 52px); margin-bottom: 28px; }

            /* Temáticos */
            .tematicos { padding: 56px 0; }
            .tematicos-header { padding: 0 20px; margin-bottom: 28px; }
            .tematicos-title { font-size: clamp(28px, 6vw, 52px); }

            /* Forms */
            .forms-section { padding: 56px 20px; }

            /* Quem somos */
            .quem-somos { padding: 56px 20px; }
            .qs-title { font-size: clamp(36px, 9vw, 58px); font-weight: 700; }
            .qs-pillars { display: flex; flex-direction: column; gap: 24px; }
            .qs-pillar { padding: 24px 20px; }
            .qs-watermark { width: 72px; bottom: 16px; right: 20px; }

            /* CTA */
            .cta-section { padding: 56px 20px; }
            .cta-title { font-size: clamp(28px, 6vw, 52px); }

            /* Footer */
            footer { padding: 24px 20px; }
            .ft-brand { height: 22px; }
        }

        /* ══════════════════════════════════════════════════════════
           MOBILE — 480px
        ══════════════════════════════════════════════════════════ */
        @media (max-width: 480px) {
            /* Nav */
            nav { padding: 16px 20px; }
            .nav-brand { height: 26px; }

            /* Hero */
            .hero-title .line1 { font-size: clamp(28px, 10vw, 48px); }
            .hero-content { padding-bottom: 24vh; }

            /* Carousel */
            .tematico-card { flex: 0 0 80%; }
            .carousel-outer { padding: 0 16px; }
            .carousel-btn { width: 36px; height: 36px; font-size: 20px; }

            /* Forms */
            .forms-card { padding: 28px 16px; }
            .form-row { grid-template-columns: 1fr; }
            .forms-section { padding: 44px 16px; }

            /* Quem somos / pillars */
            .quem-somos { padding: 44px 16px; }
            .qs-watermark { width: 56px; opacity: 0.07; }

            /* CTA */
            .cta-section { padding: 44px 16px; }

            /* Footer */
            footer { padding: 20px 16px; }
            .ft-copy { font-size: 11px; }
        }
    </style>
</head>
